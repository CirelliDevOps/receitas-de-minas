<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Receitas de Minas</title>
</head>
<body>
    <header>

        <h1>Delicias de Minas</h1>
        
    </header>
       <main>
            <section>
                    <h2>Pão de Queijo</h2>
                    <img src="images/paodequeijo.png" alt="Pao de Queijo">
                    <button popovertarget="segredo">Ver segredo do Chef</button>
                    <div id="segredo" popover >
                        <p>
                            Jamais coloque os ovos com a massa quente,
                            senão eles cozinham e o pao nao cresce!
                        </p>

                    </div>
            </section>

       </main>
<section>
    <h3>Ingredientes</h3>
<ul>
    <li>1 ovo inteiro</li>
    <li>1 colher (café) de sal</li>
    <li>1 xicara (chá) de leite</li>
    <li>1 xicara (chá) de queijo minas meio cura ralado</li>
    <li>1 xicara (chá) de polvilho azedo</li>
</ul>
</section>

</body>
</html>
